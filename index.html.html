<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyDeck Studio</title>
  <style>
    :root {
      --bg: #040b14;
      --bg2: #071827;
      --panel: rgba(255,255,255,0.055);
      --panel2: rgba(255,255,255,0.035);
      --line: rgba(96, 230, 255, 0.16);
      --line-strong: rgba(96, 230, 255, 0.38);
      --cyan: #5ee7ff;
      --cyan2: #00c8ff;
      --amber: #ffb84a;
      --amber2: #ff8f2a;
      --text: #e9f8ff;
      --muted: #8ea4b8;
      --danger: #ff667c;
      --ok: #6dffb1;
      --shadow: 0 0 28px rgba(94, 231, 255, 0.15);
      --radius: 18px;
      --sidebar: 270px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 200, 255, 0.18), transparent 28%),
        radial-gradient(circle at 90% 0%, rgba(255, 184, 74, 0.12), transparent 25%),
        linear-gradient(135deg, var(--bg), var(--bg2) 48%, #02060c);
      color: var(--text);
      overflow: hidden;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { display: flex; height: 100vh; width: 100vw; }
    .sidebar {
      width: var(--sidebar);
      flex: 0 0 var(--sidebar);
      padding: 22px;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(18px);
      overflow-y: auto;
    }
    .brand { display: flex; gap: 12px; align-items: center; margin-bottom: 28px; }
    .brand-mark {
      width: 46px; height: 46px; border-radius: 16px;
      display: grid; place-items: center;
      background: rgba(94, 231, 255, 0.11);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      color: var(--cyan);
      font-weight: 900;
      letter-spacing: -1px;
    }
    .brand-title { font-size: 19px; font-weight: 800; letter-spacing: .2px; }
    .brand-sub { color: rgba(188, 244, 255, .68); font-size: 12px; margin-top: 2px; }
    .nav { display: grid; gap: 8px; }
    .nav-btn {
      width: 100%;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 13px 14px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: .16s ease;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.045); }
    .nav-btn.active {
      color: var(--text);
      background: rgba(94, 231, 255, .115);
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }
    .nav-icon { width: 23px; text-align: center; color: var(--cyan); }
    .flow-card {
      margin-top: 28px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,184,74,.22);
      background: rgba(255,184,74,.07);
    }
    .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .22em; color: rgba(255,211,144,.82); margin-bottom: 8px; }
    .flow-card p { margin: 0; color: #d6dce4; font-size: 13px; line-height: 1.5; }

    .main { flex: 1; height: 100vh; overflow-y: auto; padding: 28px; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .page-kicker { color: rgba(188,244,255,.65); font-size: 11px; text-transform: uppercase; letter-spacing: .28em; margin-bottom: 8px; }
    h1 { margin: 0; font-size: clamp(28px, 3vw, 42px); letter-spacing: -.04em; }
    .subtitle { color: var(--muted); max-width: 820px; margin-top: 8px; line-height: 1.5; }

    .btn {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 10px 13px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      transition: .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--line-strong); background: rgba(94,231,255,.09); }
    .btn.primary { background: var(--cyan); color: #03101b; border-color: transparent; font-weight: 800; }
    .btn.primary:hover { background: #9ef1ff; }
    .btn.amber { background: rgba(255,184,74,.14); border-color: rgba(255,184,74,.35); color: #ffe4b6; }
    .btn.danger { background: rgba(255,102,124,.12); border-color: rgba(255,102,124,.35); color: #ffc5cd; }
    .btn.small { padding: 7px 10px; font-size: 12px; border-radius: 12px; }
    .btn.block { width: 100%; justify-content: center; }

    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.24);
      backdrop-filter: blur(18px);
    }
    .card.hoverable { transition: .16s ease; }
    .card.hoverable:hover { transform: translateY(-3px); border-color: var(--line-strong); box-shadow: var(--shadow), 0 18px 50px rgba(0,0,0,.24); }
    .card-title { margin: 0 0 8px; font-size: 18px; }
    .muted { color: var(--muted); }
    .small-text { font-size: 12px; color: var(--muted); }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(94,231,255,.10);
      color: #bef7ff;
      white-space: nowrap;
    }
    .badge.amber { border-color: rgba(255,184,74,.36); background: rgba(255,184,74,.11); color: #ffe1ac; }
    .badge.danger { border-color: rgba(255,102,124,.36); background: rgba(255,102,124,.11); color: #ffc5cd; }
    .badge.ok { border-color: rgba(109,255,177,.36); background: rgba(109,255,177,.1); color: #c8ffe0; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .stack { display: grid; gap: 12px; }
    .project-row, .list-row {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      background: rgba(255,255,255,.035);
    }
    .searchbar { position: relative; flex: 1; }
    .searchbar input {
      width: 100%;
      color: var(--text);
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      padding: 12px 14px 12px 38px;
    }
    .searchbar span { position: absolute; left: 13px; top: 10px; color: var(--muted); }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn {
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.035);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .filter-btn.active { color: var(--text); border-color: var(--line-strong); background: rgba(94,231,255,.11); }

    .studio-layout { display: grid; grid-template-columns: 300px minmax(520px, 1fr) 330px; gap: 16px; align-items: start; }
    .studio-layout.preview { grid-template-columns: minmax(700px, 1fr) 330px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 20px;
      background: rgba(255,255,255,.035);
      border: 1px solid var(--line);
    }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    select, input, textarea {
      color: var(--text);
      background: rgba(4,11,20,.72);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      outline: none;
      width: 100%;
    }
    textarea { min-height: 74px; resize: vertical; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; }
    label .field-title { color: #cfefff; font-size: 12px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab { flex: 1; padding: 9px 10px; border-radius: 13px; border: 1px solid rgba(255,255,255,.07); background: rgba(255,255,255,.035); color: var(--muted); }
    .tab.active { color: var(--text); border-color: var(--line-strong); background: rgba(94,231,255,.11); }
    .palette-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .palette-item {
      min-height: 94px;
      padding: 12px;
      border-radius: 17px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.035);
      text-align: left;
      color: var(--text);
    }
    .palette-item:hover { border-color: var(--line-strong); background: rgba(94,231,255,.08); }
    .palette-icon { font-size: 22px; margin-bottom: 8px; color: var(--cyan); }
    .scrollbox { max-height: 560px; overflow-y: auto; padding-right: 4px; }

    .canvas-wrap { min-width: 0; }
    .canvas-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .canvas {
      position: relative;
      height: 620px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background-color: #071625;
      background-image: linear-gradient(rgba(94,231,255,.075) 1px, transparent 1px), linear-gradient(90deg, rgba(94,231,255,.075) 1px, transparent 1px);
      background-size: 36px 36px;
      overflow: hidden;
      box-shadow: inset 0 0 70px rgba(94,231,255,.045), 0 24px 70px rgba(0,0,0,.32);
      user-select: none;
    }
    .canvas.preview {
      background-image: radial-gradient(circle at 50% 18%, rgba(94,231,255,.12), transparent 33%);
    }
    .canvas-labels {
      position: absolute; left: 20px; right: 20px; top: 16px;
      display: flex; justify-content: space-between;
      color: rgba(190,247,255,.48);
      font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
      pointer-events: none;
    }
    .canvas-item {
      position: absolute;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(2,8,15,.78);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
      transition: box-shadow .15s ease, border-color .15s ease, background .15s ease;
      touch-action: none;
      overflow: hidden;
    }
    .canvas-item.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(94,231,255,.13), 0 0 30px rgba(94,231,255,.28);
    }
    .canvas-item.active {
      border-color: rgba(94,231,255,.58);
      background: rgba(94,231,255,.12);
      box-shadow: 0 0 28px rgba(94,231,255,.24);
    }
    .canvas-item.unbound { border-color: rgba(255,184,74,.42); }
    .item-label { font-weight: 900; letter-spacing: .04em; font-size: 15px; z-index: 2; }
    .item-type { font-size: 10px; color: rgba(226,245,255,.62); z-index: 2; }
    .item-badge { position: absolute; bottom: 5px; right: 5px; font-size: 9px; padding: 2px 5px; border-radius: 999px; background: rgba(0,0,0,.45); color: var(--cyan); border: 1px solid rgba(94,231,255,.24); }
    .unbound .item-badge { color: var(--amber); border-color: rgba(255,184,74,.28); }
    .resize-handle {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: 13px;
      height: 13px;
      border-right: 2px solid var(--cyan);
      border-bottom: 2px solid var(--cyan);
      opacity: .75;
      cursor: nwse-resize;
    }

    .shape-toggle { border-radius: 17px; }
    .shape-button { border-radius: 16px; box-shadow: inset 0 -8px 12px rgba(0,0,0,.25); }
    .shape-lamp { border-radius: 999px; }
    .shape-knob, .shape-gauge, .shape-rotary { border-radius: 999px; }
    .shape-slider { border-radius: 18px; }
    .shape-seven { border-radius: 12px; font-family: "Courier New", monospace; }
    .shape-selector { border-radius: 999px; }
    .shape-annunciator { border-radius: 10px; }
    .knob-tick, .gauge-needle {
      position: absolute;
      width: 2px;
      height: 38%;
      background: var(--cyan);
      top: 15%;
      left: calc(50% - 1px);
      transform-origin: bottom center;
      transform: rotate(35deg);
      box-shadow: 0 0 12px rgba(94,231,255,.7);
    }
    .gauge-needle { height: 42%; top: 20%; transform: rotate(-48deg); background: var(--amber); box-shadow: 0 0 12px rgba(255,184,74,.7); }
    .slider-track {
      position: absolute;
      width: 72%; height: 5px; border-radius: 999px;
      background: rgba(255,255,255,.16);
      bottom: 17px;
    }
    .slider-thumb { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--cyan); left: 56%; top: -4px; box-shadow: 0 0 12px rgba(94,231,255,.7); }
    .annun-on { color: #1a0f00; background: var(--amber); padding: 4px 7px; border-radius: 6px; font-weight: 900; }
    .seven-text { font-family: "Courier New", monospace; color: var(--cyan); text-shadow: 0 0 12px rgba(94,231,255,.8); font-weight: 900; }

    .inspector-grid { display: grid; gap: 12px; }
    .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .empty-state { padding: 22px; border-radius: 20px; border: 1px dashed var(--line-strong); color: var(--muted); text-align: center; }

    .code-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .code-box {
      min-height: 520px;
      max-height: 62vh;
      overflow: auto;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.48);
      color: #c7f7ff;
      font-family: "Courier New", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre;
    }

    .health { display: flex; gap: 8px; flex-wrap: wrap; }
    .warnings { margin-top: 12px; display: grid; gap: 8px; }
    .warning { border: 1px solid rgba(255,184,74,.28); background: rgba(255,184,74,.08); color: #ffe5ba; border-radius: 14px; padding: 9px 11px; font-size: 12px; }

    .toast {
      position: fixed; right: 24px; bottom: 24px; z-index: 1000;
      background: rgba(5,16,28,.94);
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      padding: 13px 16px;
      color: var(--text);
      box-shadow: var(--shadow), 0 18px 45px rgba(0,0,0,.3);
      display: none;
    }
    .toast.show { display: block; animation: toast-in .18s ease; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 1200px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .studio-layout, .studio-layout.preview { grid-template-columns: 1fr; }
      .sidebar { width: 230px; flex-basis: 230px; }
    }
    @media (max-width: 820px) {
      body { overflow: auto; }
      .app { flex-direction: column; height: auto; min-height: 100vh; }
      .sidebar { width: 100%; flex-basis: auto; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main { height: auto; overflow: visible; padding: 18px; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .page-header, .toolbar { flex-direction: column; align-items: stretch; }
      .canvas { height: 560px; }
    }
  </style>
</head>

      ];

      var templates = [
        { id: "lighting", name: "Lighting Panel", system: "Lighting", description: "Exterior lighting cluster for GA aircraft.", moduleIds: ["landing-lights", "taxi-lights", "beacon-light", "nav-lights", "strobe-lights", "panel-dimmer"] },

        { id: "engine", name: "Engine Start", system: "Engine", description: "Starter, magnetos, fuel pump, and power basics.", moduleIds: ["battery-master", "alternator", "fuel-pump", "magneto-selector", "engine-starter"] },
        { id: "radio", name: "Radio Stack", system: "Radios", description: "Radio frequency displays and transponder starter set.", moduleIds: ["com1", "nav1", "transponder"] }
      ];

      var state = {
        activePage: "dashboard",
        projects: [],
        currentProject: null,
        selectedCanvasItemId: null,
        previewMode: false,
        paletteTab: "modules",
        moduleQuery: "",
        moduleCategory: "All",
        variableQuery: "",
        variableCategory: "All",
        variableKind: "All",
        projectQuery: "",
        projectAircraft: "All",
        exportTab: "manifest.json",
        lastSaveMessage: ""
      };

      function uid(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 9) + "_" + Date.now().toString(36);
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function attr(value) { return escapeHtml(value); }

      function findModule(id) {
        for (var i = 0; i < modules.length; i++) if (modules[i].id === id) return modules[i];
        return null;
      }

      function createCanvasItemFromModule(module, index) {
        var x = 26 + ((index * 145) % 560);
        var y = 76 + (Math.floor(index / 4) * 118);
        var variableName = module.defaultVariable || "";
        var item = {
          id: uid("item"),
          label: module.shortLabel || module.name.slice(0, 5).toUpperCase(),
          controlType: module.defaultControlType,
          moduleId: module.id,
          x: x,
          y: y,
          width: module.suggestedWidth || 112,
          height: module.suggestedHeight || 82,
          simvar: module.defaultVariableKind === "SimVar" ? variableName : "",
          lvar: module.defaultVariableKind === "LVar" ? variableName : "",
          variableKind: module.defaultVariableKind || "None",
          units: module.units || "",
          category: module.category || "Custom",
          bound: Boolean(variableName),
          active: false,
          defaultValue: false,
          min: 0,
          max: 100,
          step: 1,
          zIndex: index + 1
        };
        return item;
      }

      function createBlankCanvasItem(type, index) {
        return {
          id: uid("item"),
          label: type.toUpperCase().slice(0, 6),
          controlType: type,
          moduleId: "",
          x: 40 + ((index * 120) % 560),
          y: 90 + (Math.floor(index / 5) * 100),
          width: type === "Slider" || type === "SevenSegment" ? 160 : 110,
          height: type === "Knob" || type === "Gauge" || type === "RotaryEncoder" || type === "MultiPositionSelector" ? 110 : 78,
          simvar: "",
          lvar: "",
          variableKind: "None",
          units: "",
          category: "Custom",
          bound: false,
          active: false,
          defaultValue: false,
          min: 0,
          max: 100,
          step: 1,
          zIndex: index + 1
        };
      }

      function createProjectFromTemplate(template) {
        var items = [];
        for (var i = 0; i < template.moduleIds.length; i++) {
          var m = findModule(template.moduleIds[i]);
          if (m) items.push(createCanvasItemFromModule(m, i));
        }
        return {
          id: uid("project"),
          name: template.name,
          aircraftProfile: template.id === "autopilot" ? "Generic MSFS" : "C172",
          description: template.description,
          version: "0.1.0",
          canvasItems: items,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          status: "Ready to Export",
          unsavedChanges: true
        };
      }

      function createBlankProject() {
        return {
          id: uid("project"),
          name: "Untitled SkyDeck Panel",
          aircraftProfile: "Generic MSFS",
          description: "Blank cockpit panel project.",
          version: "0.1.0",
          canvasItems: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          status: "Draft",
          unsavedChanges: true
        };
      }

      function sampleProjects() {
        var p1 = createProjectFromTemplate(templates[0]);
        p1.name = "C172 Night Lighting";
        p1.aircraftProfile = "C172";
        p1.unsavedChanges = false;
        p1.updatedAt = new Date().toISOString();
        var p2 = createProjectFromTemplate(templates[1]);
        p2.name = "A320 AP Mini Panel";
        p2.aircraftProfile = "A320";
        p2.unsavedChanges = false;
        if (p2.canvasItems[2]) { p2.canvasItems[2].bound = false; p2.canvasItems[2].simvar = ""; }
        var p3 = createProjectFromTemplate(templates[3]);
        p3.name = "Generic Radio Stack";
        p3.aircraftProfile = "Generic MSFS";
        p3.unsavedChanges = false;
        return [p1, p2, p3];
      }

      function loadState() {
        var stored = null;
        try { stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch (e) { stored = null; }
        state.projects = Array.isArray(stored) && stored.length ? stored : sampleProjects();
        var currentId = localStorage.getItem(CURRENT_KEY);
        state.currentProject = state.projects.find(function (p) { return p.id === currentId; }) || state.projects[0] || createBlankProject();
        if (!state.projects.find(function (p) { return p.id === state.currentProject.id; })) state.projects.push(state.currentProject);
        state.selectedCanvasItemId = state.currentProject.canvasItems[0] ? state.currentProject.canvasItems[0].id : null;
      }

      function persistAll() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.projects));
          if (state.currentProject) localStorage.setItem(CURRENT_KEY, state.currentProject.id);
        } catch (e) {
          showToast("Could not save to localStorage. Browser storage may be blocked.");
        }
      }

      function saveCurrentProject() {
        if (!state.currentProject) return;
        state.currentProject.updatedAt = new Date().toISOString();
        state.currentProject.status = computeProjectStatus(state.currentProject);
        state.currentProject.unsavedChanges = false;
        var idx = state.projects.findIndex(function (p) { return p.id === state.currentProject.id; });
        if (idx >= 0) state.projects[idx] = state.currentProject;
        else state.projects.push(state.currentProject);
        persistAll();
        state.lastSaveMessage = "Saved just now";
        showToast("Project saved locally");
        render();
      }

      function markDirty() {
        if (!state.currentProject) return;
        state.currentProject.unsavedChanges = true;
        state.currentProject.updatedAt = new Date().toISOString();
        state.currentProject.status = computeProjectStatus(state.currentProject);
        var idx = state.projects.findIndex(function (p) { return p.id === state.currentProject.id; });
        if (idx >= 0) state.projects[idx] = state.currentProject;
      }

      function computeProjectStatus(project) {
        var validation = validateProject(project);
        if (!project.canvasItems.length) return "Draft";
        if (validation.warnings.length) return "Needs Bindings";
        return "Ready to Export";
      }

      function getSelectedItem() {
        if (!state.currentProject) return null;
        return state.currentProject.canvasItems.find(function (i) { return i.id === state.selectedCanvasItemId; }) || null;
      }

      function setActivePage(id) {
        state.activePage = id;
        render();
      }

      function showToast(message) {
        var toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show";
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function () { toast.className = "toast"; }, 2200);
      }

      function render() {
        var app = document.getElementById("app");
        app.innerHTML = '<div class="app">' + renderSidebar() + '<main class="main">' + renderPage() + '</main></div>';
        attachEvents();
      }

      function renderSidebar() {
        var nav = pages.map(function (p) {
          return '<button class="nav-btn ' + (state.activePage === p.id ? 'active' : '') + '" data-nav="' + p.id + '"><span class="nav-icon">' + p.icon + '</span><span>' + p.label + '</span></button>';
        }).join("");
        return '<aside class="sidebar"><div class="brand"><div class="brand-mark">SD</div><div><div class="brand-title">SkyDeck Studio</div><div class="brand-sub">MSFS Panel Builder</div></div></div><nav class="nav">' + nav + '</nav><div class="flow-card"><div class="eyebrow">Build Flow</div><p>Template → Modules → Bindings → Preview → Export</p></div></aside>';
      }

      function pageHeader(title, subtitle, actionHtml) {
        return '<div class="page-header"><div><div class="page-kicker">Cockpit Addon Workspace</div><h1>' + escapeHtml(title) + '</h1><div class="subtitle">' + escapeHtml(subtitle) + '</div></div><div>' + (actionHtml || '') + '</div></div>';
      }

      function renderPage() {
        if (state.activePage === "dashboard") return renderDashboard();
        if (state.activePage === "studio") return renderStudio();
        if (state.activePage === "modules") return renderModulesPage();
        if (state.activePage === "variables") return renderVariablesPage();
        if (state.activePage === "projects") return renderProjectsPage();
        if (state.activePage === "export") return renderExportPage();
        return renderDashboard();
      }

      function renderDashboard() {
        var action = '<button class="btn primary" data-action="new-project">+ New Project</button> <button class="btn" data-nav="studio">Open Studio</button>';
        var html = pageHeader("Build MSFS cockpit panels without hand-coding layouts", "Drag in cockpit modules, bind them to SimVars/LVars, preview behavior, and export addon-ready files.", action);
        html += '<div class="grid grid-4">' + templates.map(function (t) {
          return '<div class="card hoverable"><div class="row"><span class="badge amber">' + escapeHtml(t.system) + '</span><span class="muted">▦</span></div><h2 class="card-title" style="margin-top:16px">' + escapeHtml(t.name) + '</h2><p class="muted">' + escapeHtml(t.description) + '</p><p class="small-text">' + t.moduleIds.length + ' modules · pre-bound starter set</p><button class="btn block" data-template="' + t.id + '">Open Template</button></div>';
        }).join("") + '</div>';
        html += '<div class="grid grid-3" style="margin-top:18px"><div class="card" style="grid-column:span 2"><div class="row"><h2 class="card-title">Recent Projects</h2><button class="btn small" data-nav="projects">View all</button></div><div class="stack">' + state.projects.slice(0, 4).map(renderProjectRow).join("") + '</div></div>';
        html += '<div class="card"><h2 class="card-title">Module Packs</h2><div class="stack">' + ["Basic GA Electrical", "C172 Lighting Cluster", "Autopilot Mini Row", "Radio Stack Starter", "Annunciator Strip"].map(function (pack) {
          return '<button class="list-row" data-nav="modules"><span>' + escapeHtml(pack) + '</span><span class="badge">+</span></button>';
        }).join("") + '</div></div></div>';
        return html;
      }

      function renderProjectRow(project) {
        var statusClass = project.status === "Ready to Export" ? "ok" : project.status === "Needs Bindings" ? "amber" : "";
        return '<div class="project-row"><div><strong>' + escapeHtml(project.name) + '</strong><div class="small-text">' + escapeHtml(project.aircraftProfile) + ' · ' + project.canvasItems.length + ' controls · Updated ' + formatDate(project.updatedAt) + '</div></div><div class="row"><span class="badge ' + statusClass + '">' + escapeHtml(project.status) + '</span><button class="btn small" data-open-project="' + project.id + '">Open</button></div></div>';
      }

      function formatDate(value) {
        if (!value) return "unknown";
        var d = new Date(value);
        if (isNaN(d.getTime())) return "unknown";
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      }

      function renderStudio() {
        var project = state.currentProject;
        var validation = validateProject(project);
        var status = renderHealth(project, validation);
        var html = pageHeader("Studio", "Add cockpit modules, arrange the panel, edit bindings, then preview the final cockpit-style layout.", "");
        html += '<div class="toolbar"><div class="toolbar-left"><strong>' + escapeHtml(project.name) + '</strong><span class="badge ' + (project.unsavedChanges ? 'amber' : 'ok') + '">' + (project.unsavedChanges ? 'Unsaved changes' : (state.lastSaveMessage || 'Saved')) + '</span><select id="aircraft-profile" style="width:170px"><option>Generic MSFS</option><option>C172</option><option>A320</option><option>TBM</option><option>Custom Aircraft</option></select></div><div class="toolbar-right"><button class="btn amber" data-action="toggle-preview">' + (state.previewMode ? 'Editor Mode' : 'Preview Mode') + '</button><button class="btn" data-action="save-project">💾 Save</button><button class="btn primary" data-nav="export">Export</button></div></div>';
        html += status;
        html += '<div class="studio-layout ' + (state.previewMode ? 'preview' : '') + '">';
        if (!state.previewMode) html += renderPalette();
        html += renderCanvas();
        html += renderInspector();
        html += '</div>';
        return html;
      }

      function renderHealth(project, validation) {
        var total = project.canvasItems.length;
        var bound = project.canvasItems.filter(function (i) { return i.bound; }).length;
        var unbound = total - bound;
        var html = '<div class="card" style="margin-bottom:16px;padding:12px 14px"><div class="row"><div class="health"><span class="badge">Controls: ' + total + '</span><span class="badge ok">Bound: ' + bound + '</span><span class="badge ' + (unbound ? 'amber' : 'ok') + '">Unbound: ' + unbound + '</span><span class="badge ' + (validation.ready ? 'ok' : 'amber') + '">' + (validation.ready ? 'Ready to export' : 'Needs review') + '</span></div><span class="small-text">Version ' + escapeHtml(project.version) + '</span></div>';
        if (validation.warnings.length) html += '<div class="warnings">' + validation.warnings.slice(0, 3).map(function (w) { return '<div class="warning">' + escapeHtml(w) + '</div>'; }).join("") + '</div>';
        html += '</div>';
        return html;
      }

      function renderPalette() {
        var html = '<section class="card"><div class="tabs"><button class="tab ' + (state.paletteTab === 'components' ? 'active' : '') + '" data-palette-tab="components">Components</button><button class="tab ' + (state.paletteTab === 'modules' ? 'active' : '') + '" data-palette-tab="modules">Modules</button></div>';
        if (state.paletteTab === "components") {
          html += '<div class="palette-grid">' + controlTypes.map(function (c) {
            return '<button class="palette-item" data-add-control="' + c.type + '"><div class="palette-icon">' + c.icon + '</div><strong>' + c.type + '</strong><div class="small-text">' + escapeHtml(c.description) + '</div></button>';
          }).join("") + '</div>';
        } else {
          html += '<div class="searchbar" style="margin-bottom:10px"><span>⌕</span><input id="studio-module-search" value="' + attr(state.moduleQuery) + '" placeholder="Search modules..." /></div><div class="scrollbox stack">' + filteredModules().slice(0, 18).map(function (m) {
            return '<button class="list-row" data-add-module="' + m.id + '"><div><strong>' + escapeHtml(m.name) + '</strong><div class="small-text">' + escapeHtml(m.category) + ' · ' + escapeHtml(m.defaultVariable) + '</div></div><span class="badge">+</span></button>';
          }).join("") + '</div>';
        }
        html += '</section>';
        return html;
      }

      function filteredModules() {
        var q = state.moduleQuery.toLowerCase();
        return modules.filter(function (m) {
          var matchesQ = !q || (m.name + " " + m.category + " " + m.defaultVariable + " " + m.tags.join(" ")).toLowerCase().indexOf(q) >= 0;
          var matchesCat = state.moduleCategory === "All" || m.category === state.moduleCategory;
          return matchesQ && matchesCat;
        });
      }

      function filteredVariables() {
        var q = state.variableQuery.toLowerCase();
        return variables.filter(function (v) {
          var matchesQ = !q || (v.name + " " + v.kind + " " + v.category + " " + v.description).toLowerCase().indexOf(q) >= 0;
          var matchesCat = state.variableCategory === "All" || v.category === state.variableCategory;
          var matchesKind = state.variableKind === "All" || v.kind === state.variableKind;

        html += '<div class="filter-bar">' + categories.map(function (c) { return '<button class="filter-btn ' + (state.moduleCategory === c ? 'active' : '') + '" data-module-category="' + c + '">' + c + '</button>'; }).join("") + '</div>';
        html += '<div class="grid grid-2">' + filteredModules().map(function (m) {

      function renderVariablesPage() {
        var categories = ["All"].concat(unique(variables.map(function (v) { return v.category; })));
        var html = pageHeader("Variables", "Search SimVars/LVars and bind them to the selected Studio control.", '<button class="btn primary" data-nav="studio">Open Studio</button>');
        html += '<div class="row" style="margin-bottom:14px"><div class="searchbar"><span>⌕</span><input id="variables-search" value="' + attr(state.variableQuery) + '" placeholder="Search variables..." /></div><select id="variable-kind-filter" style="width:150px"><option>All</option><option ' + (state.variableKind === 'SimVar' ? 'selected' : '') + '>SimVar</option><option ' + (state.variableKind === 'LVar' ? 'selected' : '') + '>LVar</option></select></div>';
        html += '<div class="filter-bar">' + categories.map(function (c) { return '<button class="filter-btn ' + (state.variableCategory === c ? 'active' : '') + '" data-variable-category="' + c + '">' + c + '</button>'; }).join("") + '</div>';
        html += '<div class="grid grid-2">' + filteredVariables().map(function (v) {
          return '<div class="card"><div class="row"><div><span class="badge">' + escapeHtml(v.kind) + '</span> <span class="badge amber">' + escapeHtml(v.units) + '</span></div><button class="btn small" data-copy-variable="' + attr(v.name) + '">Copy</button></div><h2 class="card-title" style="margin-top:14px;font-family:Courier New,monospace;color:var(--cyan)">' + escapeHtml(v.name) + '</h2><p class="muted">' + escapeHtml(v.description) + '</p><p class="small-text">Category: ' + escapeHtml(v.category) + ' · Writable: ' + (v.writable ? 'Yes' : 'No') + '</p><button class="btn block" data-bind-variable="' + v.id + '">Bind to Selected Item</button></div>';

      function renderProjectsPage() {
        var aircraft = ["All"].concat(unique(state.projects.map(function (p) { return p.aircraftProfile; })));
        var q = state.projectQuery.toLowerCase();
        var filtered = state.projects.filter(function (p) {
          return (!q || (p.name + " " + p.aircraftProfile).toLowerCase().indexOf(q) >= 0) && (state.projectAircraft === "All" || p.aircraftProfile === state.projectAircraft);
        }).sort(function (a, b) { return new Date(b.updatedAt) - new Date(a.updatedAt); });
        var html = pageHeader("Projects", "Manage locally saved panel projects. This V1 uses browser localStorage.", '<button class="btn primary" data-action="new-project">+ New Project</button>');
        html += '<div class="row" style="margin-bottom:14px"><div class="searchbar"><span>⌕</span><input id="projects-search" value="' + attr(state.projectQuery) + '" placeholder="Search projects..." /></div><select id="project-aircraft-filter" style="width:180px">' + aircraft.map(function (a) { return '<option ' + (state.projectAircraft === a ? 'selected' : '') + '>' + a + '</option>'; }).join("") + '</select></div>';
        html += '<div class="stack">' + filtered.map(function (p) {
          return '<div class="card"><div class="row"><div><h2 class="card-title">' + escapeHtml(p.name) + '</h2><div class="small-text">' + escapeHtml(p.aircraftProfile) + ' · ' + p.canvasItems.length + ' controls · Version ' + escapeHtml(p.version) + ' · Updated ' + formatDate(p.updatedAt) + '</div></div><span class="badge ' + (p.status === 'Ready to Export' ? 'ok' : p.status === 'Needs Bindings' ? 'amber' : '') + '">' + escapeHtml(p.status) + '</span></div><div style="margin-top:14px" class="row"><div class="small-text">' + escapeHtml(p.description || '') + '</div><div class="row"><button class="btn small" data-open-project="' + p.id + '">Open</button><button class="btn small" data-duplicate-project="' + p.id + '">Duplicate</button><button class="btn small amber" data-export-project="' + p.id + '">Export</button><button class="btn small danger" data-delete-project="' + p.id + '">Delete</button></div></div></div>';
        }).join("") + '</div>';

      function renderExportPage() {
        var files = generateExportFiles(state.currentProject);
        var validation = validateProject(state.currentProject);
        var tabs = ["manifest.json", "panel.html", "style.css", "README.md"];
        var html = pageHeader("Export", "Generated files update from the actual current project state. Copy or download each file.", '<button class="btn primary" data-download-all="true">Download All</button>');
        html += renderHealth(state.currentProject, validation);
        html += '<div class="card"><div class="code-tabs">' + tabs.map(function (t) { return '<button class="tab ' + (state.exportTab === t ? 'active' : '') + '" data-export-tab="' + t + '">' + t + '</button>'; }).join("") + '</div>';
        html += '<pre class="code-box" id="export-code">' + escapeHtml(files[state.exportTab]) + '</pre><div class="row" style="margin-top:14px"><div class="small-text">Current file: ' + escapeHtml(state.exportTab) + '</div><div class="row"><button class="btn" data-copy-export="true">Copy</button><button class="btn amber" data-download-current="true">Download ' + escapeHtml(state.exportTab) + '</button></div></div></div>';
        return html;
      }

      function unique(arr) {
        var out = [];
        arr.forEach(function (x) { if (out.indexOf(x) < 0) out.push(x); });
        return out;
      }

      function updateSelectedItem(patch) {
        var item = getSelectedItem();
        if (!item) return;
        Object.keys(patch).forEach(function (k) { item[k] = patch[k]; });
        if (item.variableKind === "SimVar") { item.lvar = ""; item.bound = Boolean(item.simvar); }
        else if (item.variableKind === "LVar") { item.simvar = ""; item.bound = Boolean(item.lvar); }
        else { item.simvar = ""; item.lvar = ""; item.bound = false; }
        markDirty();
        render();
      }

      function addModuleToProject(moduleId) {
        var m = findModule(moduleId);
        if (!m || !state.currentProject) return;
        var item = createCanvasItemFromModule(m, state.currentProject.canvasItems.length);
        item.zIndex = maxZ() + 1;
        state.currentProject.canvasItems.push(item);
        state.selectedCanvasItemId = item.id;
        markDirty();
        showToast(m.name + " added");
        state.activePage = "studio";
        render();
      }

      function addControlToProject(type) {
        if (!state.currentProject) return;
        var item = createBlankCanvasItem(type, state.currentProject.canvasItems.length);
        item.zIndex = maxZ() + 1;
        state.currentProject.canvasItems.push(item);
        state.selectedCanvasItemId = item.id;
        markDirty();
        render();
      }

      function maxZ() {
        if (!state.currentProject || !state.currentProject.canvasItems.length) return 0;
        return Math.max.apply(null, state.currentProject.canvasItems.map(function (i) { return Number(i.zIndex) || 0; }));
      }

      function duplicateSelected() {
        var item = getSelectedItem();
        if (!item) return;
        var copy = JSON.parse(JSON.stringify(item));
        copy.id = uid("item");
        copy.label = item.label + " 2";
        copy.x += 20;
        copy.y += 20;
        copy.zIndex = maxZ() + 1;
        state.currentProject.canvasItems.push(copy);
        state.selectedCanvasItemId = copy.id;
        markDirty();
        render();
      }

      function deleteSelected() {
        if (!state.selectedCanvasItemId) return;
        state.currentProject.canvasItems = state.currentProject.canvasItems.filter(function (i) { return i.id !== state.selectedCanvasItemId; });
        state.selectedCanvasItemId = state.currentProject.canvasItems[0] ? state.currentProject.canvasItems[0].id : null;
        markDirty();
        render();
      }

      function bindVariableToSelected(varId) {
        var item = getSelectedItem();
        var variable = variables.find(function (v) { return v.id === varId; });
        if (!item) { showToast("Select a canvas item first"); state.activePage = "studio"; render(); return; }
        if (!variable) return;
        item.variableKind = variable.kind;
        item.simvar = variable.kind === "SimVar" ? variable.name : "";
        item.lvar = variable.kind === "LVar" ? variable.name : "";
        item.units = variable.units;
        item.category = variable.category;
        item.bound = true;
        markDirty();
        showToast("Variable bound to " + item.label);
        state.activePage = "studio";
        render();
      }

      function validateProject(project) {
        var warnings = [];
        if (!project) return { ready: false, warnings: ["No project loaded."] };
        var labels = {};
        project.canvasItems.forEach(function (item) {
          if (!item.bound) warnings.push(item.label + " is unbound.");
          if (item.variableKind === "SimVar" && !item.simvar) warnings.push(item.label + " is set to SimVar but has no SimVar name.");
          if (item.variableKind === "LVar" && !item.lvar) warnings.push(item.label + " is set to LVar but has no LVar name.");
          var key = String(item.label || "").trim().toLowerCase();
          if (key) labels[key] = (labels[key] || 0) + 1;
        });
        Object.keys(labels).forEach(function (label) { if (labels[label] > 1) warnings.push("Duplicate label: " + label); });
        return { ready: warnings.length === 0 && project.canvasItems.length > 0, warnings: warnings };
      }

      function safeName(name) {
        return String(name || "skydeck-panel").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "skydeck-panel";
      }

      function generateExportFiles(project) {
        return {
          "manifest.json": generateManifestJson(project),
          "panel.html": generatePanelHtml(project),
          "style.css": generateStyleCss(project),
          "README.md": generateReadme(project)
        };
      }

      function generateManifestJson(project) {
        var data = {
          name: safeName(project.name),
          title: project.name,
          version: project.version,
          content_type: "CUSTOM_PANEL",
          creator: "SkyDeck Studio",
          aircraftProfile: project.aircraftProfile,
          generatedAt: new Date().toISOString(),
          panel: "panel.html",
          style: "style.css",
          controls: project.canvasItems.length
        };
        return JSON.stringify(data, null, 2);
      }

      function generatePanelHtml(project) {
        var lines = [];
        lines.push('<!DOCTYPE html>');
        lines.push('<html lang="en">');
        lines.push('<head>');
        lines.push('  <meta charset="UTF-8" />');
        lines.push('  <meta name="viewport" content="width=device-width, initial-scale=1.0" />');
        lines.push('  <title>' + escapeForCode(project.name) + '</title>');
        lines.push('  <link rel="stylesheet" href="style.css" />');
        lines.push('</head>');
        lines.push('<body>');
        lines.push('  <div class="skydeck-panel" data-aircraft-profile="' + escapeForCode(project.aircraftProfile) + '">');
        project.canvasItems.forEach(function (item) {
          var variable = item.variableKind === "LVar" ? item.lvar : item.simvar;
          lines.push('    <div');
          lines.push('      id="' + escapeForCode(item.id) + '"');
          lines.push('      class="skydeck-control skydeck-' + escapeForCode(item.controlType.toLowerCase()) + (item.active ? ' active' : '') + (!item.bound ? ' unbound' : '') + '"');
          lines.push('      data-label="' + escapeForCode(item.label) + '"');
          lines.push('      data-control-type="' + escapeForCode(item.controlType) + '"');
          lines.push('      data-variable-kind="' + escapeForCode(item.variableKind) + '"');
          if (item.variableKind === "SimVar") lines.push('      data-simvar="' + escapeForCode(variable) + '"');
          if (item.variableKind === "LVar") lines.push('      data-lvar="' + escapeForCode(variable) + '"');
          lines.push('      data-units="' + escapeForCode(item.units || '') + '"');
          lines.push('      data-default-value="' + escapeForCode(item.defaultValue) + '"');
          lines.push('    >');
          lines.push('      <span class="skydeck-label">' + escapeForCode(item.label) + '</span>');
          lines.push('      <span class="skydeck-type">' + escapeForCode(item.controlType) + '</span>');
          lines.push('    </div>');
        });
        lines.push('  </div>');
        lines.push('</body>');
        lines.push('</html>');
        return lines.join('\n');
      }

      function generateStyleCss(project) {
        var lines = [];
        lines.push(':root { --cyan: #5ee7ff; --amber: #ffb84a; --bg: #071625; }');
        lines.push('body { margin: 0; background: #02060c; font-family: Arial, sans-serif; color: #e9f8ff; }');
        lines.push('.skydeck-panel { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: radial-gradient(circle at 50% 20%, rgba(94,231,255,.12), transparent 36%), #071625; border: 1px solid rgba(94,231,255,.25); }');
        lines.push('.skydeck-control { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(255,255,255,.2); background: rgba(2,8,15,.78); color: #e9f8ff; box-shadow: inset 0 0 24px rgba(0,0,0,.28); }');
        lines.push('.skydeck-control.active { border-color: rgba(94,231,255,.65); background: rgba(94,231,255,.13); box-shadow: 0 0 28px rgba(94,231,255,.28); }');
        lines.push('.skydeck-control.unbound { border-color: rgba(255,184,74,.6); }');
        lines.push('.skydeck-label { font-weight: 900; letter-spacing: .04em; }');
        lines.push('.skydeck-type { font-size: 10px; opacity: .65; margin-top: 4px; }');
        lines.push('.skydeck-toggle, .skydeck-button, .skydeck-slider { border-radius: 16px; }');
        lines.push('.skydeck-knob, .skydeck-gauge, .skydeck-lamp, .skydeck-rotaryencoder, .skydeck-multipositionselector { border-radius: 999px; }');
        lines.push('.skydeck-sevensegment { border-radius: 12px; font-family: "Courier New", monospace; color: var(--cyan); text-shadow: 0 0 12px rgba(94,231,255,.8); }');
        lines.push('.skydeck-annunciator { border-radius: 10px; color: #ffe3ad; }');
        project.canvasItems.forEach(function (item) {
          lines.push('#' + cssEscape(item.id) + ' { left: ' + item.x + 'px; top: ' + item.y + 'px; width: ' + item.width + 'px; height: ' + item.height + 'px; z-index: ' + item.zIndex + '; }');
        });
        return lines.join('\n');
      }

      function generateReadme(project) {
        var validation = validateProject(project);
        var bound = project.canvasItems.filter(function (i) { return i.bound; }).length;
        return '# ' + project.name + '\n\n' +
          'Generated by SkyDeck Studio.\n\n' +
          '- Aircraft profile: ' + project.aircraftProfile + '\n' +
          '- Version: ' + project.version + '\n' +
          '- Controls/modules: ' + project.canvasItems.length + '\n' +
          '- Bound controls: ' + bound + '\n' +
          '- Unbound controls: ' + (project.canvasItems.length - bound) + '\n' +
          '- Export status: ' + (validation.ready ? 'Ready to export' : 'Needs review') + '\n\n' +
          'Files included:\n\n' +
          '- manifest.json\n' +
          '- panel.html\n' +
          '- style.css\n\n' +
          'V1 note: this is a local prototype export. Real MSFS runtime integration and SimConnect behavior are intentionally out of scope for this version.\n';
      }

      function escapeForCode(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function cssEscape(value) {
        return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
      }

      function downloadFile(filename, content) {
        var blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () { showToast("Copied to clipboard"); }).catch(function () { fallbackCopy(text); });
        } else fallbackCopy(text);
      }

      function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); showToast("Copied to clipboard"); } catch (e) { showToast("Copy failed"); }
        document.body.removeChild(ta);
      }

      function attachEvents() {
        document.querySelectorAll("[data-nav]").forEach(function (el) {
          el.addEventListener("click", function () { setActivePage(el.getAttribute("data-nav")); });
        });
        document.querySelectorAll("[data-template]").forEach(function (el) {
          el.addEventListener("click", function () {
            var t = templates.find(function (x) { return x.id === el.getAttribute("data-template"); });
            if (!t) return;
            state.currentProject = createProjectFromTemplate(t);
            state.projects.push(state.currentProject);
            state.selectedCanvasItemId = state.currentProject.canvasItems[0] ? state.currentProject.canvasItems[0].id : null;
            state.activePage = "studio";
            persistAll();
            render();
          });
        });
        document.querySelectorAll("[data-open-project]").forEach(function (el) {
          el.addEventListener("click", function () {
            var id = el.getAttribute("data-open-project");
            var p = state.projects.find(function (x) { return x.id === id; });
            if (!p) return;
            state.currentProject = p;
            state.selectedCanvasItemId = p.canvasItems[0] ? p.canvasItems[0].id : null;
            state.activePage = "studio";
            persistAll();
            render();
          });
        });
        document.querySelectorAll("[data-add-module]").forEach(function (el) {
          el.addEventListener("click", function () { addModuleToProject(el.getAttribute("data-add-module")); });
        });
        document.querySelectorAll("[data-add-control]").forEach(function (el) {
          el.addEventListener("click", function () { addControlToProject(el.getAttribute("data-add-control")); });
        });
        document.querySelectorAll("[data-palette-tab]").forEach(function (el) {
          el.addEventListener("click", function () { state.paletteTab = el.getAttribute("data-palette-tab"); render(); });
        });
        document.querySelectorAll("[data-canvas-item]").forEach(function (el) {
          el.addEventListener("pointerdown", startDragOrSelect);
        });
        document.querySelectorAll("[data-resize-item]").forEach(function (el) {
          el.addEventListener("pointerdown", startResize);
        });
        document.querySelectorAll("[data-action]").forEach(function (el) {
          el.addEventListener("click", function () { handleAction(el.getAttribute("data-action")); });
        });
        document.querySelectorAll("[data-module-category]").forEach(function (el) {
          el.addEventListener("click", function () { state.moduleCategory = el.getAttribute("data-module-category"); render(); });
        });
        document.querySelectorAll("[data-variable-category]").forEach(function (el) {
          el.addEventListener("click", function () { state.variableCategory = el.getAttribute("data-variable-category"); render(); });
        });
        document.querySelectorAll("[data-bind-variable]").forEach(function (el) {
          el.addEventListener("click", function () { bindVariableToSelected(el.getAttribute("data-bind-variable")); });
        });
        document.querySelectorAll("[data-copy-variable]").forEach(function (el) {
          el.addEventListener("click", function () { copyText(el.getAttribute("data-copy-variable")); });
        });
        document.querySelectorAll("[data-export-tab]").forEach(function (el) {
          el.addEventListener("click", function () { state.exportTab = el.getAttribute("data-export-tab"); render(); });
        });
        document.querySelectorAll("[data-duplicate-project]").forEach(function (el) {
          el.addEventListener("click", function () { duplicateProject(el.getAttribute("data-duplicate-project")); });
        });
        document.querySelectorAll("[data-delete-project]").forEach(function (el) {
          el.addEventListener("click", function () { deleteProject(el.getAttribute("data-delete-project")); });
        });
        document.querySelectorAll("[data-export-project]").forEach(function (el) {
          el.addEventListener("click", function () {
            var p = state.projects.find(function (x) { return x.id === el.getAttribute("data-export-project"); });
            if (p) { state.currentProject = p; state.activePage = "export"; render(); }
          });
        });
        var aircraft = document.getElementById("aircraft-profile");
        if (aircraft) {
          aircraft.value = state.currentProject.aircraftProfile;
          aircraft.addEventListener("change", function () { state.currentProject.aircraftProfile = aircraft.value; markDirty(); render(); });
        }
        bindInput("studio-module-search", function (v) { state.moduleQuery = v; render(); });
        bindInput("modules-search", function (v) { state.moduleQuery = v; render(); });
        bindInput("variables-search", function (v) { state.variableQuery = v; render(); });
        bindInput("projects-search", function (v) { state.projectQuery = v; render(); });
        bindInput("variable-kind-filter", function (v) { state.variableKind = v; render(); });
        bindInput("project-aircraft-filter", function (v) { state.projectAircraft = v; render(); });
        attachPropertyEvents();
        attachExportEvents();
      }

      function bindInput(id, cb) {
        var el = document.getElementById(id);
        if (el) el.addEventListener("input", function () { cb(el.value); });
      }

      function attachPropertyEvents() {
        var item = getSelectedItem();
        if (!item) return;
        var fields = [
          ["prop-label", function (v) { item.label = v; }],
          ["prop-control-type", function (v) { item.controlType = v; }],
          ["prop-variable-kind", function (v) { item.variableKind = v; }],
          ["prop-units", function (v) { item.units = v; }],
          ["prop-category", function (v) { item.category = v; }],
          ["prop-default", function (v) { item.defaultValue = v; }],
          ["prop-x", function (v) { item.x = Number(v) || 0; }],
          ["prop-y", function (v) { item.y = Number(v) || 0; }],
          ["prop-width", function (v) { item.width = Math.max(40, Number(v) || 40); }],
          ["prop-height", function (v) { item.height = Math.max(36, Number(v) || 36); }],
          ["prop-z", function (v) { item.zIndex = Number(v) || 1; }],
          ["prop-bound", function (v) { item.bound = v === "true"; }]
        ];
        fields.forEach(function (pair) {
          var el = document.getElementById(pair[0]);
          if (el) el.addEventListener("change", function () {
            pair[1](el.value);
            syncVariableField(item);
            markDirty();
            render();
          });
        });
        var variableInput = document.getElementById("prop-variable");
        if (variableInput) variableInput.addEventListener("change", function () {
          if (item.variableKind === "SimVar") item.simvar = variableInput.value;
          else if (item.variableKind === "LVar") item.lvar = variableInput.value;
          else { item.simvar = ""; item.lvar = ""; }
          item.bound = item.variableKind !== "None" && Boolean(variableInput.value.trim());
          markDirty();
          render();
        });
      }

      function syncVariableField(item) {
        var variableInput = document.getElementById("prop-variable");
        var value = variableInput ? variableInput.value : "";
        if (item.variableKind === "SimVar") { item.simvar = value || item.simvar; item.lvar = ""; item.bound = Boolean(item.simvar); }
        else if (item.variableKind === "LVar") { item.lvar = value || item.lvar; item.simvar = ""; item.bound = Boolean(item.lvar); }
        else { item.simvar = ""; item.lvar = ""; item.bound = false; }
      }

      function attachExportEvents() {
        var files = state.currentProject ? generateExportFiles(state.currentProject) : {};
        var copy = document.querySelector("[data-copy-export]");
        if (copy) copy.addEventListener("click", function () { copyText(files[state.exportTab] || ""); });
        var down = document.querySelector("[data-download-current]");
        if (down) down.addEventListener("click", function () { downloadFile(state.exportTab, files[state.exportTab] || ""); });
        var all = document.querySelector("[data-download-all]");
        if (all) all.addEventListener("click", function () {
          Object.keys(files).forEach(function (name) { downloadFile(name, files[name]); });
        });
      }

      function handleAction(action) {
        if (action === "new-project") {
          state.currentProject = createBlankProject();
          state.projects.push(state.currentProject);
          state.selectedCanvasItemId = null;
          state.activePage = "studio";
          persistAll();
          render();
          return;
        }
        if (action === "toggle-preview") { state.previewMode = !state.previewMode; render(); return; }
        if (action === "save-project") { saveCurrentProject(); return; }
        if (action === "toggle-active") {
          var item = getSelectedItem();
          if (item) { item.active = !item.active; markDirty(); render(); }
          return;
        }
        if (action === "duplicate-item") { duplicateSelected(); return; }
        if (action === "delete-item") { deleteSelected(); return; }
        if (action === "bring-front") {
          var selected = getSelectedItem();
          if (selected) { selected.zIndex = maxZ() + 1; markDirty(); render(); }
          return;
        }
        if (action === "reset-position") {
          var reset = getSelectedItem();
          if (reset) { reset.x = 40; reset.y = 90; markDirty(); render(); }
          return;
        }
        if (action === "clear-binding") {
          var clear = getSelectedItem();
          if (clear) { clear.variableKind = "None"; clear.simvar = ""; clear.lvar = ""; clear.bound = false; markDirty(); render(); }
        }
      }

      function duplicateProject(id) {
        var p = state.projects.find(function (x) { return x.id === id; });
        if (!p) return;
        var copy = JSON.parse(JSON.stringify(p));
        copy.id = uid("project");
        copy.name = p.name + " Copy";
        copy.createdAt = new Date().toISOString();
        copy.updatedAt = new Date().toISOString();
        copy.unsavedChanges = false;
        copy.canvasItems.forEach(function (item) { item.id = uid("item"); });
        state.projects.push(copy);
        persistAll();
        render();
      }

      function deleteProject(id) {
        if (state.projects.length <= 1) { showToast("Keep at least one project"); return; }
        state.projects = state.projects.filter(function (p) { return p.id !== id; });
        if (state.currentProject && state.currentProject.id === id) {
          state.currentProject = state.projects[0];
          state.selectedCanvasItemId = state.currentProject.canvasItems[0] ? state.currentProject.canvasItems[0].id : null;
        }
        persistAll();
        render();
      }

      function startDragOrSelect(event) {
        if (state.previewMode) return;
        if (event.target && event.target.hasAttribute("data-resize-item")) return;
        var el = event.currentTarget;
        var id = el.getAttribute("data-canvas-item");
        var item = state.currentProject.canvasItems.find(function (i) { return i.id === id; });
        if (!item) return;
        state.selectedCanvasItemId = id;
        var canvas = document.getElementById("canvas");
        var rect = canvas.getBoundingClientRect();
        var startX = event.clientX;
        var startY = event.clientY;
        var startLeft = item.x;
        var startTop = item.y;
        var moved = false;
        el.setPointerCapture(event.pointerId);

        function move(e) {
          var dx = e.clientX - startX;
          var dy = e.clientY - startY;
          if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
          var newX = Math.max(0, Math.min(rect.width - item.width, startLeft + dx));
          var newY = Math.max(0, Math.min(rect.height - item.height, startTop + dy));
          newX = Math.round(newX / 6) * 6;
          newY = Math.round(newY / 6) * 6;
          item.x = newX;
          item.y = newY;
          el.style.left = newX + "px";
          el.style.top = newY + "px";
        }
        function up(e) {
          el.releasePointerCapture(event.pointerId);
          el.removeEventListener("pointermove", move);
          el.removeEventListener("pointerup", up);
          if (moved) markDirty();
          render();
        }
        el.addEventListener("pointermove", move);
        el.addEventListener("pointerup", up);
      }

      function startResize(event) {
        event.stopPropagation();
        if (state.previewMode) return;
        var id = event.currentTarget.getAttribute("data-resize-item");
        var item = state.currentProject.canvasItems.find(function (i) { return i.id === id; });
        if (!item) return;
        state.selectedCanvasItemId = id;
        var handle = event.currentTarget;
        var parent = handle.closest(".canvas-item");
        var startX = event.clientX;
        var startY = event.clientY;
        var startW = item.width;
        var startH = item.height;
        handle.setPointerCapture(event.pointerId);
        function move(e) {
          var w = Math.max(48, startW + (e.clientX - startX));
          var h = Math.max(42, startH + (e.clientY - startY));
          w = Math.round(w / 6) * 6;
          h = Math.round(h / 6) * 6;
          item.width = w;
          item.height = h;
          parent.style.width = w + "px";
          parent.style.height = h + "px";
        }
        function up() {
          handle.releasePointerCapture(event.pointerId);
          handle.removeEventListener("pointermove", move);
          handle.removeEventListener("pointerup", up);
          markDirty();
          render();
        }
        handle.addEventListener("pointermove", move);
        handle.addEventListener("pointerup", up);
      }

      loadState();
      render();
    })();
  </script>
</body>
</html>
